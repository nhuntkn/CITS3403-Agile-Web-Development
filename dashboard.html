<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Shared styles -->
  <link rel="stylesheet" href="css/style.css" />
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- Navbar injected here by navbar.js -->
<div id="navbar"></div>

<!-- ── Page content ────────────────────────────────────────────────────── -->
<div class="page-content">

  <!-- 4 Metric cards -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="metric-card">
        <div class="card-title">Start Weight</div>
        <div class="card-value" id="startWeight">—</div>
        <div class="card-sub">kg</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="metric-card">
        <div class="card-title">Current Weight</div>
        <div class="card-value" id="currentWeight">—</div>
        <div class="card-sub">kg</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="metric-card">
        <div class="card-title">Current BMI</div>
        <div class="card-value" id="currentBMI">—</div>
        <div class="card-sub" id="bmiCategory"></div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="metric-card">
        <div class="card-title">Total Changes</div>
        <div class="card-value" id="totalChanges">—</div>
        <div class="card-sub">kg since start</div>
      </div>
    </div>
  </div>

  <!-- Calorie goal progress -->
  <div class="row mb-4">
    <div class="col-12 col-md-8 offset-md-2">
      <div class="calorie-box">
        <div class="box-title">Today's calorie goal</div>
        <div class="goal-row">
          <span class="goal-label">Calories burned</span>
          <span class="goal-count" id="goalCount">0 / 500 goal</span>
        </div>
        <div class="progress">
          <div class="progress-bar" id="calorieBar" role="progressbar"
               style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Two bar charts -->
  <div class="row g-3">
    <div class="col-12 col-md-6">
      <div class="chart-card">
        <div class="chart-title">Calories burned — this week</div>
        <div class="chart-wrapper">
          <canvas id="weeklyChart" height="160"></canvas>
        </div>
      </div>
    </div>
    <div class="col-12 col-md-6">
      <div class="chart-card">
        <div class="chart-title">Calories burned — this month</div>
        <div class="chart-wrapper">
          <canvas id="monthlyChart" height="160"></canvas>
        </div>
      </div>
    </div>
  </div>

</div><!-- /page-content -->

</body>
</html>
